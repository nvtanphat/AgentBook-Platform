version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s %(levelname)-8s %(name)-30s %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout

loggers:
  uvicorn:
    level: INFO
    propagate: false
    handlers: [console]
  uvicorn.error:
    level: INFO
    propagate: false
    handlers: [console]
  uvicorn.access:
    level: WARNING
    propagate: false
    handlers: [console]
  src:
    level: DEBUG
    propagate: false
    handlers: [console]
  beanie:
    level: WARNING
    propagate: false
    handlers: [console]
  motor:
    level: WARNING
    propagate: false
    handlers: [console]

root:
  level: INFO
  handlers: [console]
