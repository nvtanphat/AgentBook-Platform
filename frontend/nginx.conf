server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving the `api` upstream through a variable (see
    # below) at request time — instead of once at startup — means a rebuilt api
    # container with a new IP no longer 502s until the frontend is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Must match guardrails_config.yaml upload limit (20 MB) + headroom
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend liveness probe — frontend AppShell calls /health (root, not /api/v1)
    # no-store: never let the browser heuristically cache this (a stale SPA-fallback
    # HTML response would break JSON.parse and show the app as "Offline")
    location = /health {
        add_header Cache-Control "no-store" always;
        # Variable upstream forces per-request DNS resolution (see resolver above)
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all API requests to the backend service
    location /api/ {
        # Variable upstream forces per-request DNS resolution (see resolver above)
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Agentic queries + cold-start model load can take up to 5 min
        proxy_read_timeout    600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    600s;
        # SSE (Server-Sent Events) requires buffering OFF — otherwise nginx holds
        # the stream in its buffer until full/timeout, browser sees connection closed
        proxy_buffering       off;
        proxy_cache           off;
        add_header            X-Accel-Buffering "no" always;
    }
}
