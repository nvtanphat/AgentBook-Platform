llm:
  default_provider: "local"
  local_model: "qwen3:4b"
  ollama_base_url: "http://localhost:11434"
  api_fallback_provider: "openai_compatible"
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4o-mini"
  temperature: 0.0
  max_output_tokens: 1024
  timeout_seconds: 120

embedding:
  model_name: "BAAI/bge-m3"
  dense_size: 1024
  embedding_version: "bge-m3-v1"
  device: "cpu"
  batch_size: 8
  max_length: 1024
  use_fp16: false
  normalize_embeddings: true

reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  device: "cpu"

versions:
  parse_version: "docling-2026-04-mining"
  chunk_version: "layout_v2_table_aware"
  index_version: "qdrant_dense_sparse_v1"

ocr:
  # Accuracy-first defaults for dense scanned text and Vietnamese screenshots.
  # Use PP-OCRv5_mobile_det only when CPU latency matters more than extraction quality.
  text_detection_model_name: "PP-OCRv5_server_det"
  # Keep recognition model unset on CPU: forcing PP-OCRv5_server_rec can crash the
  # Windows Paddle runtime with native allocation errors.
  text_recognition_model_name:
  text_det_limit_side_len: 1600       # preserve detail without exhausting CPU RAM
  text_det_limit_type: "max"
  rec_score_threshold: 0.5
  enable_grayscale_variant: "always"   # merge only replaces blocks when the variant scores better
  grayscale_trigger_confidence: 0.97   # used when enable_grayscale_variant is auto

pdf:
  render_scale: 2.0                    # accuracy-first OCR fallback for scanned PDF pages
