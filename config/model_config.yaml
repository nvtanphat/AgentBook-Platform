memory:
  max_turns: 10

# ── Agentic pipeline tuning ───────────────────────────────────────────────────
agentic:
  # Self-consistency voting: generate N candidates, pick the one with most
  # cross-answer sentence support. n=1 disables (single-shot, default).
  # Enable for hard multi-hop queries at cost of N× LLM calls.
  self_consistency_n: 1
  self_consistency_threshold: 0.65   # trigger below this confidence score

# ── Inference engine tuning ──────────────────────────────────────────────────
inference:
  default_answer_language: "vi"
  default_chitchat_answer: "Xin chào! Tôi có thể giúp gì cho bạn?"
  graph_timeout_seconds: 25.0
  visual_inline_retrieval_limit: 4
  visual_inline_max: 2
  retry_evidence_snippet_chars: 300
  fallback_snippet_chars: 200
  retry_evidence_limit: 5
  graph_priority_score_boost: 0.25
  graph_boost_score: 0.10
  min_chunk_chars: 40
  multi_doc_min_sources: 3
  synthesis_route_types:
    - "summarization"
    - "comparison"
    - "graph_relation"
  self_rag_evidence_char_limit: 3000
  self_rag_answer_char_limit: 2000
  memory_context_header: "LỊCH SỬ LIÊN QUAN"
  language_names:
    vi: "tiếng Việt"
    en: "English"
    zh: "Chinese"
    fr: "French"
    de: "German"
    ja: "Japanese"
    ko: "Korean"
  route_prompt_map:
    summarization: "summarization.txt"
    comparison: "comparison.txt"
    claim_check: "claim_check.txt"
    graph_relation: "graph_relation.txt"
    # Modality-specific prompts (selected by preferred_modality, overrides route)
    table: "qa_table.txt"
    figure: "qa_figure.txt"
  multi_source_prompt_file: "multi_source.txt"
  default_prompt_file: "qa_grounded.txt"
  substantive_chunk_filter_prefixes:
    - "Ghi nhớ"
    - "Note:"
    - "Starter Pack"
    - "Tập trung"
    - "Người mới"
    - "nên bắt đầu"
    - "scikit-learn User Guide"
    - "Dive into Deep"
    - "Xem thêm tại"
    - "Link:"
    - "URL:"

# ── Docling PDF converter tuning ─────────────────────────────────────────────
docling:
  queue_max_size: 1      # max in-flight pages; low to avoid std::bad_alloc on CPU
  images_scale: 0.35     # page image scale; low to fit Docling in tight RAM (prevents bad_alloc dropping table/figure pages)
  # Isolate Docling parse in a fresh subprocess — the long-running server process
  # corrupts Docling models (convert returns empty → OCR fallback → structure lost).
  subprocess_enabled: true
  subprocess_timeout_seconds: 900
  # Unload Ollama's VLM (~4.7GB) before parse so Docling has RAM (root cause of
  # bad_alloc → empty parse on 16GB machines). Captioning reloads it afterwards.
  free_ollama_before_parse: true

llm:
  default_provider: "local"
  local_model: "qwen2.5:7b"
  ollama_base_url: "http://localhost:11434"
  api_fallback_provider: "openai_compatible"
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4o-mini"
  # ── Model Routing (P3.2) ─────────────────────────────────────────────────
  # Override LLM provider for specific tasks (empty = use default_provider).
  # Use "local" for cheap extraction tasks, "api" for complex reasoning.
  # Example: extraction on local 7B, answer generation on API GPT-4o.
  extraction_provider: ""      # "" = same as default_provider
  extraction_local_model: ""   # "" = same as local_model
  temperature: 0.0
  max_output_tokens: 1024
  # Raised from 120s → 300s after v15 eval (summarization on 9-citation prompts
  # exceeded the 180s default in 3 consecutive runs, triggering false refusals
  # with reason="The answer generation pipeline failed").
  timeout_seconds: 300
  # Disabled: SLEC + quality gate (cross-encoder per-sentence scoring) replaces this
  # LLM-based pass — same coverage check at lower cost with fewer false positives.
  self_rag_reflection_enabled: false

embedding:
  model_name: "BAAI/bge-m3"
  dense_size: 1024
  embedding_version: "bge-m3-v1"
  device: "cpu"
  batch_size: 8
  max_length: 1024
  use_fp16: false
  normalize_embeddings: true

reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  device: "cpu"
  max_length: 512   # truncate each (query, chunk) pair; long chunks (big tables) otherwise make a predict batch take minutes

versions:
  parse_version: "docling-2026-04-mining"
  chunk_version: "layout_v2_table_aware"
  index_version: "qdrant_dense_sparse_v1"

audio:
  # faster-whisper for audio file transcription. Models cached locally on first use.
  # Model trade-offs on CPU (int8 quantized):
  #   tiny    (75MB)  ~5× real-time, accuracy ~60% for VN — fast but very noisy
  #   small   (250MB) ~1-2× real-time, ~70-75% — too many VN errors
  #   medium  (770MB) ~3× slower, ~85% — sweet spot for VN technical content
  #   large-v3 (1.5GB) ~6-8× slower, ~92% — best general; download cost high
  whisper_model: "medium"
  whisper_device: "cpu"
  whisper_compute_type: "int8"   # int8 cho CPU; float16 cho GPU
  whisper_beam_size: 5
  whisper_vad_filter: true       # bỏ silence trước transcribe
  # Chunking audio: gộp segments thành chunks ~30-60s mỗi cái
  audio_chunk_target_seconds: 45
  audio_chunk_min_seconds: 10

ocr:
  # Accuracy-first defaults for dense scanned text and Vietnamese screenshots.
  # Use PP-OCRv5_mobile_det only when CPU latency matters more than extraction quality.
  text_detection_model_name: "PP-OCRv5_server_det"
  # Keep recognition model unset on CPU: forcing PP-OCRv5_server_rec can crash the
  # Windows Paddle runtime with native allocation errors.
  text_recognition_model_name:
  text_det_limit_side_len: 1600       # preserve detail without exhausting CPU RAM
  text_det_limit_type: "max"
  rec_score_threshold: 0.5
  enable_grayscale_variant: "always"   # merge only replaces blocks when the variant scores better
  grayscale_trigger_confidence: 0.97   # used when enable_grayscale_variant is auto
  # Recognition engine for Vietnamese OCR:
  #   easyocr  - EasyOCR detect + recognize (fast, but drops tone marks on scans)
  #   vietocr  - EasyOCR detect + VietOCR recognize (tone-accurate, ~2-3x slower)
  # Only affects vi-language OCR; en stays on EasyOCR.
  recognition_engine: "vietocr"
  vietocr_model_name: "vgg_transformer"   # vgg_transformer (accurate) | vgg_seq2seq (faster)
  vietocr_device: "cpu"
  # Re-OCR trigger: if VI diacritics < this ratio of alpha chars, Docling text is garbled
  # (non-standard font encoding common in Vietnamese legal PDFs) → re-process with VietOCR.
  garbled_vi_diacritic_ratio: 0.03
  # ── Standalone image routing (OCR vs VLM) ──────────────────────────────────
  # An image with >= image_ocr_text_word_threshold OCR words is treated as a
  # text scan (OCR is faithful). BUT charts/tables are also text-dense yet need
  # 2D structure — when the numeric-token ratio >= image_numeric_ratio_vlm_trigger
  # the image is a chart/table, so a VLM pass (structure-aware markdown table) is
  # ADDED on top of OCR (hybrid: OCR keeps exact numbers, VLM keeps year↔metric links).
  image_ocr_text_word_threshold: 20
  image_numeric_ratio_vlm_trigger: 0.30
  image_structure_vlm_max_side_px: 2048   # higher res for the chart/table VLM pass (dense numbers)
  # VLM structure table must carry real numbers across multiple columns: a body
  # column counts as "numeric" when >= this fraction of its cells hold a digit, and
  # the table needs >= 2 numeric columns. Multi-panel pages make small VLMs emit a
  # hollow grid (only the year column filled) — that has 1 numeric column and is
  # discarded, so the pipeline keeps faithful OCR-only output.
  image_structure_vlm_min_digit_cell_ratio: 0.15
  # Max output tokens for the chart/table structure pass. Dense multi-metric pages
  # (e.g. an 8-chart financial dashboard) overflow the default 512 and truncate the
  # table mid-way; 1536 fits the full extraction.
  image_structure_vlm_num_predict: 1536
  # ── Column/panel-aware OCR layout ──────────────────────────────────────────
  # Multi-panel pages (dashboards, side-by-side charts) are split into columns by
  # vertical-whitespace gutters so adjacent panels are not merged across columns and
  # are read column-major. Thresholds are ratios of page geometry (no hardcoded px);
  # a normal single-column page detects 1 column and behaves exactly as before.
  layout_column_detection_enabled: true
  layout_column_min_gutter_ratio: 0.04
  layout_column_min_band_occupancy_ratio: 0.10
  # Hybrid table reader (2b): VLM-read numeric-dense figures on pages where Docling
  # found no table. Docling stays the exact/citation source; VLM tables get
  # table_source="vlm" + low confidence so evidence/citation treats them cautiously.
  vlm_table_fallback_enabled: true
  vlm_table_confidence: 0.5
  # Language → EasyOCR language list mapping; extend for new deployment languages
  easyocr_language_map:
    vi: ["vi"]
    en: ["en"]
  # Image preprocessing knobs (used by _ImagePreprocessor in ocr_engine.py)
  preprocessing:
    min_long_edge_px: 1600           # upscale when long side shorter than this
    low_contrast_threshold: 60       # std-dev of gray pixels; below → add binarized variant
    denoise_h: 8                     # fastNlMeansDenoising h parameter
    denoise_template_window: 7
    denoise_search_window: 21
    clahe_clip_limit: 2.5
    clahe_tile_grid: [8, 8]
    unsharp_sigma: 2                 # GaussianBlur sigmaX for unsharp mask
    unsharp_alpha: 1.4               # addWeighted src1 weight
    unsharp_beta: -0.4               # addWeighted src2 weight
    adaptive_block_size: 25          # adaptiveThreshold blockSize (must be odd)
    adaptive_c: 10                   # adaptiveThreshold C constant
    line_tolerance_px: 15            # vertical px tolerance for reading-order line grouping
    dedup_jaccard_threshold: 0.80    # near-exact duplicate detection threshold
    dedup_subset_coverage_threshold: 0.85   # partial duplicate coverage threshold
    dedup_confidence_boost_margin: 0.05     # confidence margin to prefer replacement block

pdf:
  render_scale: 2.0                    # accuracy-first OCR fallback for scanned PDF pages

visual_embedding:
  enabled: true                        # SigLIP figure embedding + image-as-query path
  model: "google/siglip-base-patch16-224"
  device: "cpu"                        # "cpu" or "cuda" — change to "cuda" for GPU, no code change needed
  dense_size: 768
  batch_size: 4
  embedding_backend: "pytorch"        # "pytorch" today; "onnx" for INT8 quantised future path

figure_captioner:
  max_workers: 4                       # max threads for parallel figure captioning
  ollama_timeout_seconds: 300.0        # httpx timeout per VLM call
  image_max_side_px: 1024              # resize longest side before base64 encoding
  num_ctx: 8192                        # Ollama context window. The 2048px chart/table structure pass
                                       # makes ~3.7k vision tokens + prompt; the 4096 default overflows
                                       # → 400 exceed_context_size_error. Keep > vision tokens + prompt.
  # List-only hallucination gate: reject captions that are mostly short bullet points
  # (e.g. VLM listing animal names from decorative photos instead of describing content)
  list_bullet_ratio_max: 0.70          # reject if fraction of bullet lines > this
  list_bullet_max_words: 3             # bullet line counts as "short" if <= this many words

vlm_query:
  enabled: true                         # use VLM over retrieved visual evidence for figure/image/chart queries
  provider: "auto"                      # auto | ollama | openai_compatible
  ollama_model: "qwen2.5vl:3b"                      # empty = auto-detect qwen2.5vl/qwen2-vl/minicpm-v/llava
  openai_model: ""                      # empty = reuse llm.openai_model
  max_images: 2                         # max retrieved corpus images passed to VLM
  image_max_side_px: 1024               # resize query/evidence images before VLM call
  timeout_seconds: 300.0
  caption_fallback: true                # fallback to caption-only text path when pixels are unavailable
  verify_enabled: true                  # lightweight VLM support check for visual answers
