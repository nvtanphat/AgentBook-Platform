  - "regularization"
  - "l1"
  - "l2"
  - "early stopping"
  - "batch normalization"
  - "layer normalization"
  - "weight decay"
  - "gradient descent"
  - "stochastic gradient descent"
  - "sgd"
  - "adam"
  - "adagrad"
  - "rmsprop"
  - "momentum"
  # Architectures
  - "transformer"
  - "attention"
  - "self-attention"
  - "cross-attention"
  - "encoder"
  - "decoder"
  - "bert"
  - "gpt"
  - "t5"
  - "llama"
  - "mistral"
  - "cnn"
  - "rnn"
  - "lstm"
  - "gru"
