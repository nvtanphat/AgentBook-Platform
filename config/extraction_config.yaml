# Anaphora pattern used for query anaphora resolution.
# Contains pronouns and deictic phrases for all supported languages.
# Edit this string to add/remove languages — no code changes needed.
anaphora_pattern: >-
  \b(nó|chúng|họ|điều này|điều đó|vấn đề này|khái niệm này|cái này|cái đó|it|they|them|this|that|these|those|the concept|the topic|the above|the same|the latter|the former)\b
