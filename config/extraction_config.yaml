# ── Metric pattern terms (joined into a single alternation regex) ─────────────
metric_terms:
  - "accuracy"
  - "precision"
  - "recall"
  - "f1[\\s\\-]?score"
  - "loss"
  - "error"
  - "auc"
  - "bleu"
  - "rouge"
  - "perplexity"
  - "map"
  - "mrr"
  - "ndcg"
  - "throughput"
  - "latency"

