# ── Knowledge graph entity extraction config ──────────────────────────────────
# Domain-agnostic prompt knobs. Inspired by Microsoft GraphRAG defaults +
# LlamaIndex 3-tier mode + LangChain LLMGraphTransformer schema flexibility.
#
# Goal: same pipeline works for ML, law, history, medicine, ... without
# touching code. New domain = just set collection.subject text.

# ── Structural KG linker ──────────────────────────────────────────────────────
# Connects each content block to its enclosing section heading via `belongs_to`
# edges, and nests sub-sections under their parent heading. Pure positional
# (reading_order + heading level), no LLM/ML. Lets graph traversal climb the
# document hierarchy (RAG-Anything style).
structure_linker:
  enabled: true
  section_confidence: 0.9       # confidence for section entities created from headings
  belongs_to_confidence: 0.85   # confidence for belongs_to relations

extraction:
  # Universal type seeds. Inject into prompt as {entity_types}.
  # Keep small + truly universal so model isn't biased toward any field.
  # Per-collection extensions come from `collection.subject` injected as hint.
  default_entity_types:
    - concept            # abstract ideas, terms, principles
    - person             # named individuals (any role)
    - organization       # companies, agencies, institutions
    - location           # geographic places
    - event              # happenings, ceremonies, milestones
    - artifact           # named works, models, products, regulations, documents
    - time               # dates, periods, eras
    - quantity           # measurements, statistics, scores

  # Extraction mode (mirrors LlamaIndex schema flexibility tiers):
  #   simple  - no type list given, LLM extracts anything meaningful (max recall)
  #   dynamic - default_entity_types as hints, LLM may add domain-specific types
  #   strict  - only default_entity_types accepted, others rejected
  # `dynamic` is the recommended default: bounded but extensible.
  mode: dynamic

  # Output format:
  #   json      - structured JSON array, validated downstream. Works on GPT-4 /
  #               Claude / MiMo cloud reliably; fragile on small local models.
  #   delimiter - GraphRAG-style ("entity"<|>NAME<|>TYPE<|>DESC) format.
  #               More robust on Qwen 3B / small models (no nested brackets).
  # Auto-routing per provider lives in `model_factory.py` — this is the fallback.
  output_format: json

  # Entity extraction backend:
  #   "llm"    — LLM-based extraction (~34 calls/material, highest recall on complex text)
  #   "gliner" — GLiNER2 local model (0 LLM calls, ~50ms/batch, no hallucinations)
  # GLiNER requires: pip install gliner  (downloads gliner_model on first run, ~500MB)
  entity_backend: "gliner"
  gliner_model: "gliner-community/gliner_medium-v2.5"
  gliner_threshold: 0.5

  # Multi-pass gleaning (GraphRAG pattern): re-prompt "anything missed?" to
  # boost recall ~15-30% on dense chunks. 0 disables, 1 = one extra pass.
  # Each gleaning pass = 1 extra LLM call per chunk batch, so cost scales.
  max_gleanings: 0

  # ── Section-aware extraction ────────────────────────────────────────────────
  # Heading names whose sections are EXCLUDED from entity/relation extraction
  # (but kept in chunking/retrieval). Prevents reference/author lists from
  # flooding the graph with single-mention person nodes. Matched at the START
  # of a heading block, optionally numbered ("6. References"). EN + VI seeds;
  # add languages/domains here, no code change needed.
  excluded_sections:
    - "references?"
    - "bibliography"
    - "acknowledge?ments?"
    - "works\\s+cited"
    - "tài\\s+liệu\\s+tham\\s+khảo"
    - "lời\\s+cảm\\s+ơn"
    - "danh\\s+mục\\s+tài\\s+liệu"

  # ── Ontology-guided entity refinement (hybrid GLiNER + LLM, OMD-GraphRAG) ────
  # After GLiNER (recall, exact spans), one cloud-LLM pass re-validates each
  # entity against this ontology: corrects mistyped labels, merges fragmented
  # spans ("biện 2" → "biện pháp bảo đảm"), drops junk, and gleans missed
  # entities. Pydantic-validated (no JSON-retry waste). Config-driven — the LLM
  # is told the allowed types + these descriptions; no hardcoded correction maps.
  entity_refine_enabled: true
  entity_refine_max_entities: 200
  entity_type_descriptions:
    concept: "Khái niệm/thuật ngữ/nguyên tắc trừu tượng (quyền, nghĩa vụ, thừa kế, self-attention)"
    person: "Cá nhân hoặc vai trò pháp lý cụ thể (vợ, chồng, người thừa kế, tác giả)"
    organization: "Tổ chức, cơ quan, công ty, toà án, doanh nghiệp"
    location: "Địa danh, nơi chốn địa lý"
    event: "Sự kiện, sự việc, cột mốc, thủ tục diễn ra"
    artifact: "Văn bản/tác phẩm/sản phẩm/mô hình/quy định có tên (di chúc, hợp đồng, BERT, luật cụ thể)"
    time: "Mốc thời gian, ngày tháng, giai đoạn"
    quantity: "Số đo, thống kê, tỉ lệ, điểm số"
    model: "Mô hình học máy/AI có tên (Transformer, BERT, GPT)"
    algorithm: "Thuật toán có tên (Adam, SGD, gradient descent)"
    dataset: "Bộ dữ liệu/benchmark (GLUE, ImageNet)"
    metric: "Độ đo đánh giá (accuracy, F1, BLEU)"
    method: "Phương pháp/kỹ thuật (fine-tuning, transfer learning)"
    framework: "Khung/thư viện công nghệ (PyTorch, TensorFlow)"
    technology: "Công nghệ tổng quát"
    field: "Lĩnh vực nghiên cứu (NLP, computer vision)"

  # ── Entity types that participate in graph relation extraction ───────────────
  # Any entity whose type is in this list can appear as source/target of a graph
  # edge. Covers all universal types so the same pipeline works across ML, law,
  # history, medicine, etc. without code changes.
  graph_entity_types:
    - concept
    - model
    - algorithm
    - framework
    - method
    - dataset
    - metric
    - artifact
    - technology
    - field
    - person
    - organization
    - event
    - location

  # ── Relation vocabulary for graph extraction ──────────────────────────────
  # Controlled set injected into the LLM prompt. Generic enough to cover any
  # domain — add or remove entries here, no code changes needed.
  relation_types:
    - uses          # A applies/employs B as a component or tool
    - extends       # A is built on top of B
    - replaces      # A is proposed in place of B
    - improves      # A enhances B's behaviour or performance
    - compared_with # A is benchmarked or contrasted with B
    - evaluates_on  # A is measured on B (model on dataset, method on case)
    - depends_on    # A requires B to function
    - part_of       # A is a sub-component or subset of B
    - contradicts   # A presents a finding or claim contrary to B
    - governs       # A (rule/law/authority) regulates or controls B
    - applies_to    # A (rule/concept) applies to or covers B
    - created_by    # A was authored, founded, or produced by B (person/org)
    - located_in    # A is situated in or belongs to B (location/domain)
    - occurred_at   # A (event) happened at or during B (time/location)
    - related_to    # generic fallback — meaningful link but no specific type

  # ── Ontology-Guided Extraction (OMD-GraphRAG pattern) ──────────────────────
  # Controls which relation types are valid for each source entity type.
  # Relations outside the allowed set are pruned after LLM extraction.
  # Missing type = no constraint (all relation_types allowed).
  ontology:
    # Technical / research types
    concept:      [uses, extends, replaces, improves, compared_with, evaluates_on, depends_on, part_of, contradicts, governs, applies_to, related_to]
    algorithm:    [uses, extends, replaces, improves, compared_with, evaluates_on, depends_on, part_of, related_to]
    metric:       [evaluates_on, compared_with, related_to]
    dataset:      [evaluates_on, related_to]
    model:        [uses, extends, replaces, improves, compared_with, evaluates_on, depends_on, part_of, related_to]
    framework:    [uses, extends, depends_on, related_to]
    method:       [uses, improves, compared_with, evaluates_on, depends_on, related_to]
    # Universal types — permissive so any domain works out of the box
    artifact:     [uses, extends, depends_on, part_of, governs, applies_to, created_by, related_to]
    organization: [governs, applies_to, located_in, part_of, created_by, related_to]
    person:       [created_by, governs, located_in, related_to]
    event:        [occurred_at, part_of, related_to]
    location:     [part_of, related_to]

  # ── Cross-lingual entity resolution (BGE-M3 cosine merge) ──────────────────
  # merge_threshold            — cross-TYPE pairs (strict). Avoids merging a
  #                              concept into a person, etc.
  # cross_lingual_merge_threshold — same-TYPE pairs (loose). Catches
  #                              cross-lingual synonyms ("Machine Learning" ↔
  #                              "Học máy") whose cosine ~0.72-0.80. Lower = more
  #                              merging (risk of false merges); tune per corpus.
  merge_threshold: 0.82
  cross_lingual_merge_threshold: 0.74

  # Field on KnowledgeCollection to inject as domain context (e.g. "Pháp luật
  # Việt Nam", "Machine learning research"). When empty → prompt skips the hint.
  domain_hint_field: subject

  # Generic fictional few-shots — taught Verdantis-style to avoid domain bias.
  # Demonstrate STRUCTURE (entity vs noise, multi-type, reject empty) without
  # anchoring the model to ML, law, or any specific field.
  few_shots:
    - input: |-
        Tổ chức Verdantis được Pavel Novak sáng lập năm 1998 tại thành phố Aurelia
        nhằm nghiên cứu phương pháp Cánh-Cửa-Xanh trong lĩnh vực Năng-lượng-Tái-tạo.
      output:
        - {name: "Verdantis", type: "organization", confidence: 0.95}
        - {name: "Pavel Novak", type: "person", confidence: 0.92}
        - {name: "1998", type: "time", confidence: 0.90}
        - {name: "Aurelia", type: "location", confidence: 0.90}
        - {name: "Cánh-Cửa-Xanh", type: "concept", confidence: 0.85}
        - {name: "Năng-lượng-Tái-tạo", type: "concept", confidence: 0.82}
    - input: |-
        Bảng 3 cho thấy kết quả trên trang 12. Xem thêm ở phần 4.2.
      output: []
    # Legal domain: extract semantic parties, rights, and obligations — NOT article numbers.
    - input: |-
        Nghĩa vụ và quyền của vợ, chồng:
        Vợ, chồng có nghĩa vụ thương yêu, chung thuỷ và cùng nhau thực hiện công việc gia đình.
        Vợ, chồng có quyền chiếm hữu, sử dụng, định đoạt tài sản chung theo quy định pháp luật.
        Trong trường hợp thừa kế, tài sản của người chết được chia theo di chúc hoặc theo pháp luật.
      output:
        - {name: "vợ", type: "person", confidence: 0.90}
        - {name: "chồng", type: "person", confidence: 0.90}
        - {name: "tài sản chung", type: "concept", confidence: 0.88}
        - {name: "thừa kế", type: "concept", confidence: 0.90}
        - {name: "di chúc", type: "artifact", confidence: 0.85}
        - {name: "quyền chiếm hữu", type: "concept", confidence: 0.82}
        - {name: "nghĩa vụ thương yêu", type: "concept", confidence: 0.78}

# ── Heuristic / regex extractor tuning ───────────────────────────────────────
heuristics:
  max_chars_per_llm_batch: 3000      # token budget per LLM entity-extraction call
  max_entity_words: 7                # entities with more words are filtered as junk
  stopword_only_max_words: 2         # max words before a stopword-only check applies
  min_extraction_confidence: 0.5     # LLM-extracted entities below this are dropped
  merge_confidence_boost: 0.02       # confidence added when merging duplicate entities
  merge_confidence_max: 0.97         # merged confidence ceiling
  confidence_method_keyword: 0.78    # confidence assigned to regex keyword-matched entities
  confidence_metric: 0.72            # confidence assigned to metric-pattern entities
  confidence_capitalized_term: 0.55  # confidence assigned to capitalized-term entities
  confidence_vietnamese_ner: 0.68    # confidence assigned to underthesea NER entities

# ── Structural junk patterns (anchored regex, applied to candidate entity names) ─
# Spans matching any pattern are rejected as structural noise, not semantic entities.
# Pattern matching uses re.IGNORECASE | re.UNICODE. Add/remove without touching code.
structural_junk_patterns:
  - "^[Đđ]iều\\s+\\d"    # Vietnamese legal article header: "Điều 69. ..." (Đ ≠ D in Unicode)
  - "^[Kk]hoản\\s+\\d"   # Vietnamese legal clause:  "Khoản 1. ..."
  - "^[Đđ]iểm\\s+[a-z]\\b"  # Vietnamese legal sub-item: "Điểm a. ..."

