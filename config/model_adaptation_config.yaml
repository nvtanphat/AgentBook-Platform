dataset:
  min_retrieval_pairs_for_finetune: 1000
  min_instruction_examples_for_qlora: 500
  hard_negatives_per_query: 2
  output_dir: "evaluation/results/model_adaptation"

calibration:
  candidate_thresholds: [0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8]
  optimize_metric: "f1"
  default_accept_threshold: 0.55

training:
  embedding_model: "BAAI/bge-m3"
  embedding_loss: "MultipleNegativesRankingLoss"
  qlora_enabled: false
  qlora_min_vram_gb: 16
