qdrant:
  collection_name: "agentbook_chunks"
  dense_vector_name: "dense"
  sparse_vector_name: "bge_m3_sparse"
  dense_size: 1024
  distance: "Cosine"
  index_batch_size: 64
  visual_collection_name: "agentbook_visual"
  visual_retrieval_top_k: 3

retrieval:
  # Compromise after v13 eval: wider than v12 but not so wide it dilutes reranker.
  # v12=8 rerank candidates was too narrow; v13=50 bloated and caused refusals.
  # 20 candidates → top 8 is a stable middle ground.
  dense_top_k: 30
  sparse_top_k: 30
  graph_top_k: 12
  top_k: 8
  final_top_k: 8           # reverted from lean 5 → 8 after observing mass refusals; SLEC needs enough sentences to avoid weighted-score floor trigger
  rrf_k: 60
  rerank_input_k: 30       # was 20 → 30 (match dense/sparse_top_k so high-rank gold chunks survive to rerank)
  graph_max_hops: 2
  agentic_rag_enabled: true
  agentic_critic_enabled: false   # skip post-synthesis critic loop (saves 30-90s/query); guardrails + slec already cover review
  agentic_max_retrieval_iterations: 0   # single retrieval pass; iterations re-ran same queries (no new info) — pure overhead
  multi_query_enabled: true
  lexical_fallback_multiplier: 3
  # ── Agentic critic loop tuning ───────────────────────────────────────────
  agentic_critic_max_follow_ups: 2     # max follow-up queries per critic cycle
  agentic_critic_context_buffer: 4     # extra chunk slots beyond final_limit after augmentation

# ── Budget-aware retrieval (phase-2 optional sub-questions) ──────────────────
# Phase 1: main queries + critical sub-questions always run.
# Phase 2: optional sub-questions only run when phase-1 evidence is weak.
# Condition: fewer than budget_min_strong_count chunks score >= budget_min_strong_score
# on the RRF fused scale (typical range 0.02–0.5).
budget_aware_retrieval:
  phase2_enabled: true
  min_strong_score: 0.045   # fused_score threshold; ~0.045 ≈ decent relevance on RRF scale
  min_strong_count: 3       # need at least this many strong chunks to skip phase-2

# ── Semantic chunk deduplication ─────────────────────────────────────────────
# Jaccard similarity threshold for near-duplicate content removal.
# Supplements chunk-id dedup: catches copy-pasted content across documents.
# Set to 1.0 to disable.
semantic_dedup:
  threshold: 0.85

# ── CRAG (Corrective RAG) thresholds ──────────────────────────────────────────
# Score gate (theo BGE reranker output, đã normalized [0,1]):
#   score ≥ correct_threshold   → CORRECT (kept, high confidence)
#   score in [incorrect, correct] → AMBIGUOUS (kept với caveat)
#   score < incorrect_threshold → INCORRECT (filtered out)
# Lưu ý: BGE reranker scores tiếng Việt thường thấp hơn tiếng Anh ~0.10-0.15
# do training data imbalance. Hạ correct_threshold từ 0.55 → 0.40 để fit VN docs.
# Adjust dựa trên eval thực tế trong VN-EduRAG-100.
crag:
  evaluator_enabled: false
  correct_threshold: 0.40
  incorrect_threshold: 0.20
  # When true, re-classifies AMBIGUOUS chunks using an LLM correctness judge.
  # Adds one LLM call per ambiguous chunk; only enable when latency allows.
  llm_enabled: false

# ── Phase B · Adaptive Retrieval Budget ──────────────────────────────────────
# Skip sparse + graph when dense alone clearly wins. Only triggers for FACTUAL /
# GENERAL / CLAIM_CHECK routes — SUMMARIZATION needs MMR diversity, COMPARISON
# needs per-source breadth, GRAPH_RELATION needs the graph explicitly.
# Decision criterion (cosine sim already in [0,1]):
#   top-1 dense score ≥ dense_skip_threshold
#   AND ≥ strong_hits_required chunks score ≥ strong_hit_min_score
# When satisfied, sparse and graph stages are skipped — cuts median latency on
# easy factual queries with no measurable recall loss in the smoke pass.
adaptive_retrieval:
  # fast_path_eligible() uses fused_score (RRF-normalised, always populated).
  # retrieve_fast() is NOT dense-only — it calls the full hybrid RRF retrieve().
  # Thresholds use fused_score (dense+sparse combined), not raw dense cosine.
  # DISABLED: thresholds (0.022 ≈ top-4 RRF hit) trigger on nearly every factual
  # query, causing the cross-encoder reranker to be skipped — the primary signal
  # for citation ordering and faithfulness. Re-enable only after calibrating
  # thresholds against citation accuracy metrics.
  enabled: false
  fused_skip_threshold: 0.022   # ≈ top-4 RRF hit (was: dense_skip_threshold)
  strong_hits_required: 3
  strong_hit_min_score: 0.017   # ≈ top-18 RRF hit
  eligible_routes: ["factual", "general", "claim_check"]

# ── Knowledge graph / mindmap rendering ──────────────────────────────────────
# Controls cross-document entity dedup, display filters, and per-request fetch
# caps for the graph endpoint. All thresholds live here so behaviour stays
# tunable without touching the route.
graph:
  fuzzy_dedup_threshold: 0.88          # token-set string similarity to merge near-identical names
  semantic_dedup_threshold: 0.82       # BGE-M3 cosine threshold for cross-lingual / paraphrase dedup
  display_min_confidence: 0.5          # entity must clear this confidence OR meet min_mentions
  display_min_mentions: 2              # …to be shown when confidence < display_min_confidence
  max_entities_fetch: 400              # cap entities loaded from Mongo per graph request
  max_relations_fetch: 400             # cap relations loaded per graph request
  max_visible_nodes: 50                # final cap after dedup / filtering. A force-directed
                                       # graph turns into an unreadable "hairball" past ~60-75
                                       # nodes; ~50 keeps an overview legible. Nodes are picked
                                       # by knowledge-edge salience (concept hubs first) and
                                       # orphans are dropped, so this shows the most meaningful
                                       # entities. Depth is reached via click-to-expand
                                       # (/entity/{id}/subgraph), not by raising this cap.
  focus_primary_cap: 15                # max primary entities kept in focus mode
  focus_neighbor_cap: 12               # 1-hop neighbours added around primary set
  focus_fallback_cap: 20               # fallback node count when name matching yields nothing
  mindmap_entity_fetch: 160            # entities pulled for mindmap construction
  mindmap_entity_cap: 60               # entities kept after dedup for mindmap

  # ── LLM semantic relation extractor (per-material call) ──────────────────
  # Tuned for typed-relation RECALL (knowledge-edge density). Wider coverage +
  # a GraphRAG-style gleaning pass surfaces relations a single pass misses.
  semantic_relation:
    max_concepts: 40           # top concepts considered for pairwise relations
    max_passages: 50           # co-mention passages sent to the LLM
    max_passage_chars: 700     # context window per passage
    gleaning: true             # second "what did you miss?" pass (recall +15-30%)
    min_knowledge_edges_for_no_fallback: 3  # viz: below this, allow co-occur supplement

# ── Modality-aware query routing ──────────────────────────────────────────────
# Detects table/figure/audio questions and runs a modality-filtered retrieval
# pass so table-native (and figure/audio) content is not buried by plain text.
# Orthogonal to the intent route (factual/comparison/…): a "compare the tables"
# query stays COMPARISON route + TABLE modality. Keywords are VI + EN; add more
# per domain — no code change needed.
routing:
  # Below this router confidence (or on COMPLEX difficulty) the query is flagged
  # should_use_agentic for the multi-step path.
  agentic_confidence_threshold: 0.55
  modality:
    enabled: true
    # NOTE: keywords are ASCII-folded before matching, so a bare monosyllable
    # collides with common Vietnamese compounds and mis-routes modality:
    #   "dòng"→dong matches "hoạt động"; "hình"/"ảnh" match "mô hình"/"tình hình"/
    #   "ảnh hưởng". Such false TABLE/FIGURE routing biases retrieval away from
    #   the answer text and causes false refusals. Prefer specific multi-word
    #   forms ("hình ảnh", "biểu đồ") over ambiguous lone syllables.
    table_keywords:
      [bảng, cột, hàng, ô, giá trị, tổng, trung bình, lớn nhất, nhỏ nhất,
       table, column, row, cell, value, sum, average, mean, total, max, min]
    figure_keywords:
      [biểu đồ, đồ thị, sơ đồ, hình vẽ, hình ảnh,
       chart, charts, figure, figures, diagram, diagrams,
       graph, graphs, plot, plots, image, images, visualization, visualizations]
    audio_keywords:
      [ghi âm, đoạn ghi, băng ghi, phút, giây, nói rằng,
       audio, recording, timestamp, minute, transcript]
    table_boost_multiplier: 0.30      # fused-score boost added to modality=table hits
    vlm_list_caption_score_penalty: 0.40  # subtract from rerank_score for VLM list-only caption chunks
    extra_pass: true                  # run a modality-filtered retrieval pass and merge
    filtered_pass_limit_ratio: 0.5    # size of that pass vs the main retrieval limit

# ── Post-retrieval graph probe (adaptive graph augmentation) ─────────────────
# After text retrieval, if top chunks mention known graph entities, adds related
# graph evidence (relations, neighbour chunks) to the context automatically.
# Works for ALL routes, not just GRAPH_RELATION — no router change needed.
graph_probe:
  enabled: true
  min_entities: 2           # minimum named entities matched in top chunks to trigger probe
  top_chunks_to_scan: 5     # how many top reranked chunks to scan for entity names
  max_graph_chunks: 4       # cap on extra chunks injected from graph probe
  skip_routes: ["claim_check"]  # routes where graph probe is redundant or risky

chunking:
  strategy: semantic
  target_token_count: 512
  min_token_count: 100
  overlap_token_count: 50
  max_blocks_per_chunk: 8
  breakpoint_percentile: 95.0
  min_content_chars: 50
