upload:
  max_file_size_mb: 20
  allowed_extensions:
    - "pdf"
    - "docx"
    - "pptx"
    - "png"
    - "jpg"
    - "jpeg"
    - "csv"
    - "xlsx"
    - "xls"

refusal:
  min_reranker_score: 0.30      # kept for reference, no longer used in refusal logic
  min_evidence_confidence: 0.20  # sigmoid scale (0-1); reranker logit also normalized before comparison
  min_graph_confidence: 0.40
  min_handwriting_quality_score: 0.72
  min_handwriting_confidence: 0.8

image_quality:
  min_blur_variance: 80.0
  min_brightness: 45.0
  max_brightness: 230.0
  min_contrast: 18.0
  max_abs_skew_degrees: 12.0
