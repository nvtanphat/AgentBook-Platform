services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    env_file: [backend/.env]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      AGENTBOOK_QDRANT_URL: http://qdrant:6333
      AGENTBOOK_QDRANT_TIMEOUT_SECONDS: "300"
      AGENTBOOK_REDIS_URL: redis://redis:6379/0
      # API enqueues ingest tasks → must point Celery at the redis service, not
      # localhost (kombu defaults to localhost:6379 otherwise → upload fails).
      AGENTBOOK_CELERY_BROKER_URL: redis://redis:6379/0
      AGENTBOOK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      AGENTBOOK_OLLAMA_BASE_URL: http://host.docker.internal:11434
      AGENTBOOK_LLM_LOCAL_MODEL: qwen2.5:7b
      AGENTBOOK_CELERY_TASK_ALWAYS_EAGER: "false"
      AGENTBOOK_EMBEDDING_USE_FP16: "false"
      # HF model cache → ./data bind mount (writable by appuser, persists across rebuilds)
      HF_HOME: /app/data/.hf_cache
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      qdrant: { condition: service_healthy }
      redis:  { condition: service_healthy }
      mongodb: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:   { memory: 4G }
        reservations: { memory: 2G }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    env_file: [backend/.env]
    environment:
      AGENTBOOK_QDRANT_URL: http://qdrant:6333
      AGENTBOOK_QDRANT_TIMEOUT_SECONDS: "300"
      AGENTBOOK_REDIS_URL: redis://redis:6379/0
      AGENTBOOK_CELERY_BROKER_URL: redis://redis:6379/0
      AGENTBOOK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      AGENTBOOK_OLLAMA_BASE_URL: http://host.docker.internal:11434
      AGENTBOOK_LLM_LOCAL_MODEL: qwen2.5:7b
      AGENTBOOK_CELERY_TASK_ALWAYS_EAGER: "false"
      AGENTBOOK_EMBEDDING_USE_FP16: "false"
      HF_HOME: /app/data/.hf_cache
    command: >
      celery -A src.tasks.celery_tasks.celery_app worker
      --loglevel=INFO --pool=threads --concurrency=1
      --queues=ingest
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      qdrant: { condition: service_healthy }
      redis:  { condition: service_healthy }
      mongodb: { condition: service_healthy }
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:   { memory: 5G }
        reservations: { memory: 2G }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 128M }
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./data/vectordb:/qdrant/storage
    deploy:
      resources:
        limits:   { memory: 1G }
        reservations: { memory: 512M }
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb",
              "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits: { memory: 512M }
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 512M }
    restart: unless-stopped

volumes:
  redis-data:
  mongodb-data:
